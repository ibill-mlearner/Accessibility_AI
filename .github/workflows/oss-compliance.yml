name: OSS Compliance Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compliance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run OSS compliance gate
        run: python scripts/compliance/compliance_gate.py
