name: accessibility-ai

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accessibility-ai-backend
    working_dir: /app
    command: python3 /app/AccessBackEnd/manage.py
    environment:
      APP_CONFIG: development
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      SQLALCHEMY_DATABASE_URI: sqlite:////app/AccessBackEnd/instance/accessibility_ai.db
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - .:/app
      - backend-instance:/app/AccessBackEnd/instance
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accessibility-ai-frontend
    working_dir: /app
    command: npm --prefix /app/AccessAppFront run dev -- --host 0.0.0.0 --port 5173 --strictPort
    volumes:
      - .:/app
      - frontend-node-modules:/app/AccessAppFront/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  frontend-node-modules:
  backend-instance:
