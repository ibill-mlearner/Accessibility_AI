name: accessibility-ai

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accessibility-ai
    working_dir: /app
    command: sh -c "python3 /app/AccessBackEnd/manage.py --init-db --init-only && python3 /app/AccessBackEnd/manage.py & npm --prefix /app/AccessAppFront run dev -- --host 0.0.0.0 --port 5173"
    environment:
      APP_CONFIG: development
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      SQLALCHEMY_DATABASE_URI: sqlite:////app/AccessBackEnd/instance/accessibility_ai.db
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "5000:5000"
      - "5173:5173"
