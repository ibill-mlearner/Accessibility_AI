name: accessibility-ai

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accessibility-ai-dev
    command: ["/usr/local/bin/start_dev_stack.sh"]
    environment:
      APP_CONFIG: development
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      SQLALCHEMY_DATABASE_URI: sqlite:////app/AccessBackEnd/instance/accessibility_ai.db
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - .:/app
      - frontend-node-modules:/app/AccessAppFront/node_modules
      - backend-instance:/app/AccessBackEnd/instance
    ports:
      - "5173:5173"

volumes:
  frontend-node-modules:
  backend-instance:
