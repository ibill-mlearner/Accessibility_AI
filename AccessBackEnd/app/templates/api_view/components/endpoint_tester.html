<div class="api-tester" data-tester-id="{{ tester_id }}">
  <label for="method-{{ tester_id }}">Method</label><br />
  <select id="method-{{ tester_id }}" class="api-tester-method">
    {% for method in ["GET", "POST", "PUT", "PATCH", "DELETE"] %}
      <option value="{{ method }}" {% if method == seed_method %}selected{% endif %}>{{ method }}</option>
    {% endfor %}
  </select><br />

  <label for="path-{{ tester_id }}">Path</label><br />
  <input id="path-{{ tester_id }}" class="api-tester-path" type="text" value="{{ seed_path }}" size="48" /><br />

  <label for="payload-{{ tester_id }}">JSON body</label><br />
  <textarea id="payload-{{ tester_id }}" class="api-tester-payload">{{ seed_payload }}</textarea><br />

  <label>
    <input type="checkbox" class="api-tester-use-auth" />
    Include Authorization header
  </label><br />

  <label for="auth-token-{{ tester_id }}">Auth token (optional)</label><br />
  <input
    id="auth-token-{{ tester_id }}"
    class="api-tester-auth-token"
    type="text"
    placeholder="Paste session token or click Use Saved Token"
    size="48"
  /><br />

  <button type="button" class="api-tester-use-saved-token">Use Saved Token</button>

  <button type="button" class="api-tester-send">Send Request</button>
  <pre class="api-tester-output">No request sent yet.</pre>
</div>
